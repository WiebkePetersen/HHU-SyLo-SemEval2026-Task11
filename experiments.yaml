      Restrict vocabulary to  "all ... is ...", "some ... is ...", "no ... is ...", ""some ... is not ...". 
      Use only singular. Write predicates and subjects capitalized. 
      No fill words. Multi-word expressions are aggregated with _
      Shorter prompt 
    system_prompt: "LogSimpShortPrompt"
    examples: "LogSimpEx"
    params:
      do_sample: false
      temperature: 0.0
      max_new_tokens: 256
      batch_size: 8



  Eng2SyllogismProlog:
