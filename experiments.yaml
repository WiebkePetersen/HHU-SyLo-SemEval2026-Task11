    output_key: "aristotelian_output_Eng2SyllogismProlog"
    output_type: "list"
    task_description: >
      Given a list of English sentences translate them to Aristotelian syllogistic notation. 
    system_prompt: "SyllTrip"
    examples: "SyllTripEx"
    params:
      do_sample: false
      temperature: 0.0
      max_new_tokens: 256
      batch_size: 8



