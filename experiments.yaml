experiments: 
  Simp1:
    model: "HuggingFaceTB/SmolLM3-3B"
    input_key: "syllogism"
    output_key: "syllogism_simplified_Simp1"
    output_type: "list"
    task_description: >
      Translate original sentences to logical pseudo English. 
      Restrict vocabulary to  "all ... is ...", "some ... is ...", "no ... is ...", ""some ... is not ...". 
      Use only singular. Write predicates and subjects capitalized. 
      No fill words. Multi-word expressions are aggregated with _ 
    system_prompt: "LogSimp"
    examples: "LogSimpEx"
    params:
      do_sample: false
      temperature: 0.0
      max_new_tokens: 256
      batch_size: 8



  Simp2:
    model: "HuggingFaceTB/SmolLM3-3B"
    input_key: "syllogism"
    output_key: "syllogism_simplified_Simp2"
